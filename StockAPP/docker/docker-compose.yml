services:
  mysql:
    image: mysql:8.0
    container_name: stockapp-mysql
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=stockapp
      - MYSQL_USER=stockapp
      - MYSQL_PASSWORD=stockapp
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ustockapp", "-pstockapp"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: stockapp-backend
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_STORAGE_BACKEND=mysql
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=stockapp
      - MYSQL_USER=stockapp
      - MYSQL_PASSWORD=stockapp
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: stockapp-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: stockapp-network

volumes:
  mysql_data:
